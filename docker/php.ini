; ---- Production PHP settings for the app container ----

memory_limit = 512M
max_execution_time = 300
max_input_time = 300

; Large uploads: ticket photos + Excel imports (maatwebsite/excel)
upload_max_filesize = 64M
post_max_size = 64M
max_file_uploads = 50

expose_php = Off
date.timezone = Asia/Jakarta

; ---- OPcache (production) ----
opcache.enable = 1
opcache.enable_cli = 0
opcache.memory_consumption = 192
opcache.interned_strings_buffer = 16
opcache.max_accelerated_files = 20000
opcache.validate_timestamps = 0
opcache.revalidate_freq = 0
opcache.fast_shutdown = 1
# JIT left OFF: tracing JIT on PHP 8.1 can segfault php-fpm on some code paths,
# which surfaces as a blank nginx "500 Internal Server Error" (empty upstream
# response). OPcache itself stays on; the perf difference for this app is tiny.
opcache.jit = disable
opcache.jit_buffer_size = 0

; ---- Realpath cache ----
realpath_cache_size = 4096k
realpath_cache_ttl = 600
